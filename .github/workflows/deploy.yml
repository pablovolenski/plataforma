name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy theme → wp-content/themes/plataforma/
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" \
            -e "set ssl:verify-certificate no; mirror -R ./theme/ ${FTP_SERVER_DIR}themes/plataforma/; quit"

      - name: Deploy plugin → wp-content/plugins/plataforma-social/
        env:
          FTP_SERVER:     ${{ secrets.FTP_SERVER }}
          FTP_USERNAME:   ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" \
            -e "set ssl:verify-certificate no; mirror -R ./plugin/plataforma-social/ ${FTP_SERVER_DIR}plugins/plataforma-social/; quit"
