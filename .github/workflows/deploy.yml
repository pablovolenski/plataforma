name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme → wp-content/themes/plataforma/
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}themes/plataforma/
          local-dir:  ./theme/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Deploy plugin → wp-content/plugins/plataforma-social/
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}plugins/plataforma-social/
          local-dir:  ./plugin/plataforma-social/
          exclude: |
            **/.git*
            **/.git*/**
